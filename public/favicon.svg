<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Vibrant Blue-to-Cyan Text Gradient -->
    <linearGradient id="sp-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
    
    <!-- Accent Dot Gradient (Matching Navbar SP. Dot & Online Status) -->
    <linearGradient id="dot-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <!-- Deep Dark Navy/Black Rounded Square Canvas Badge -->
  <rect width="512" height="512" rx="120" fill="#0A0E1A" />

  <!-- Inner Tech Subtle Ring Outline -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="#1E293B" stroke-width="8" opacity="0.6" />

  <!-- Monogram "SP." Group (Centered with Precision) -->
  <g transform="translate(240, 276)">
    <!-- Main "SP" Monogram -->
    <text 
      x="-35" 
      y="38" 
      text-anchor="middle" 
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Space Grotesk', 'Inter', 'Segoe UI', sans-serif" 
      font-size="210" 
      font-weight="900" 
      letter-spacing="-12" 
      fill="url(#sp-gradient)"
    >SP</text>
    
    <!-- Accent Green/Cyan Dot (Matching SP. Logo & Online Status) -->
    <circle cx="145" cy="24" r="28" fill="url(#dot-gradient)" />
  </g>
</svg>